name: Feature Request
description: Suggest an improvement for fm-bench
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like fm-bench to do?
    validations:
      required: true
