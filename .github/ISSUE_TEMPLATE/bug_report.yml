name: Bug Report
description: Report a problem with fm-bench
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: fm-bench version
      placeholder: "fm-bench --version"
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Paste `fm-bench doctor`.
      render: text
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command you ran, without private prompts if needed.
      render: shell
