name: Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "npm version argument: patch, minor, major, prepatch, preminor, premajor, prerelease, or an exact semver"
        required: true
        default: patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  version:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.version }}" -m "Release %s"
          git push --follow-tags
